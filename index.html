<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>I LOVE YOU ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}
</style>
</head>

<body>
<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// Window size ပြောင်းရင် canvas size ပါ လိုက်ပြောင်းပေးခြင်း
window.addEventListener('resize', () => {
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});

const stars=[];

for(let i=0;i<200;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2
    });
}

const heart=[];

// နှလုံးသားရဲ့ ပတ်လည် line ပေါ်မှာပဲ စာသားရှိအောင် သေချာတွက်ချက်ထားခြင်း
for(let t=0;t<Math.PI*2;t+=0.15){

    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)
          -2*Math.cos(3*t)-Math.cos(4*t));

    heart.push({
        x:x*18, // size ကို နည်းနည်းထိန်းထားပါတယ်
        y:y*18
    });
}

function animate(){

    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.shadowBlur = 0;

    stars.forEach(s=>{
        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
        ctx.fill();

        s.y+=0.2;
        if(s.y>canvas.height) s.y=0;
    });

    let scale=1+0.08*Math.sin(Date.now()/400);

    // ၁။ နှလုံးသားပုံစံ "I LOVE YOU" စာသားများ ရေးဆွဲခြင်း
    ctx.font="bold 13px Arial"; // စာသားကို ပိုသပ်ရပ်အောင် စာလုံးသေးပေးထားပါတယ်
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    heart.forEach((p,i)=>{
        let x=canvas.width/2+p.x*scale;
        let y=canvas.height/2+p.y*scale;

        ctx.shadowColor="#ff0066";
        ctx.shadowBlur=15;
        ctx.fillStyle="#ff4d88";

        ctx.fillText("I LOVE YOU",x,y);
    });

    // ၂။ အလယ်က နာမည်နောက်ခံကို စာသားတွေနဲ့ မရောအောင် အဝိုင်းမှိန်မှိန်လေး ခံပေးခြင်း
    ctx.shadowBlur = 0;
    ctx.fillStyle = "rgba(0,0,0,0.6)"; // နာမည်နောက်က စာသားတွေကို ဖုံးကွယ်ပေးမယ့် အမှောင် Layer
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, 120, 0, Math.PI*2);
    ctx.fill();

    // ၃။ "TPZ" နာမည်ကို အပေါ်ဆုံး Layer ကနေ အကြီးကြီး ထင်ထင်ရှားရှား ရေးဆွဲခြင်း
    ctx.font = "bold 85px Arial";
    ctx.fillStyle = "#ffffff";
    ctx.shadowColor = "#ff0066";
    ctx.shadowBlur = 35;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.fillText(
        "TPZ",
        canvas.width/2,
        canvas.height/2
    );

    requestAnimationFrame(animate);
}

animate();

</script>
</body>
</html>
