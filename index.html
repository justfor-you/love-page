<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(135deg,#ff5f8f,#ff9eb5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
}

.center{
    text-align:center;
    color:white;
    z-index:10;
}

.heart{
    font-size:120px;
    animation:beat 1s infinite;
}

h1{
    font-size:50px;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

.floating{
    position:absolute;
    animation:fall 6s linear infinite;
}

@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.25);}
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="center">
    <div class="heart">❤️</div>
    <h1>I LOVE YOU</h1>
    <button onclick="showLove()">💌 Will You Be Mine?</button>
</div>

<script>

function showLove(){
    document.body.innerHTML = 
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;color:white;">
        <h1 style="font-size:70px;">❤️ I LOVE YOU ❤️</h1>
        <h2>You Make My World Beautiful 🌹</h2>
    </div>
    ;
}

function createItem(){
    let item=document.createElement("div");

    let symbols=["❤️","💖","🌹","💕"];
    item.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];

    item.className="floating";
    item.style.left=Math.random()*100+"vw";
    item.style.fontSize=(20+Math.random()*40)+"px";

    document.body.appendChild(item);

    setTimeout(()=>{
        item.remove();
    },6000);
}

setInterval(createItem,250);

</script>

</body>
</html>
