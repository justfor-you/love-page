<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>I LOVE YOU ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}
</style>
</head>

<body>
<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const stars=[];

for(let i=0;i<200;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2
    });
}

const heart=[];

for(let t=0;t<Math.PI*2;t+=0.12){

    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)
          -2*Math.cos(3*t)-Math.cos(4*t));

    heart.push({
        x:x*20,
        y:y*20
    });
}

function animate(){

    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    stars.forEach(s=>{
        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
        ctx.fill();

        s.y+=0.2;
        if(s.y>canvas.height) s.y=0;
    });

    let scale=1+0.08*Math.sin(Date.now()/400);

    ctx.font="18px Arial";

    heart.forEach((p,i)=>{

        let x=canvas.width/2+p.x*scale;
        let y=canvas.height/2+p.y*scale;

        ctx.shadowColor="#ff0066";
        ctx.shadowBlur=20;
        ctx.fillStyle="#ff4d88";

        ctx.fillText("I LOVE YOU",x,y);
    });

ctx.font = "bold 80px Arial";
ctx.fillStyle = "white";
ctx.shadowColor = "#ff0066";
ctx.shadowBlur = 30;
ctx.textAlign = "center";

ctx.fillText(
    "TPZ",
    canvas.width/2,
    canvas.height/2
);
    requestAnimationFrame(animate);
}

animate();

</script>
</body>
</html>
